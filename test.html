<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test de Razonamiento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="./assets/css/style.css?v=300">
</head>

<body class="test-bg">

<nav class="navbar navbar-expand-lg navbar-dark test-navbar shadow-sm">
    <div class="container py-2">
        <div>
            <span class="navbar-brand fw-bold mb-0 d-block">
                <i class="bi bi-journal-text me-2"></i>Test de Razonamiento
            </span>
            <small class="text-white-50">Portal del evaluado</small>
        </div>

        <div class="d-flex align-items-center gap-2 text-white mt-3 mt-lg-0">
            <div class="user-chip">
                <i class="bi bi-person-circle me-2"></i>
                <span id="nombreEvaluado">Evaluado</span>
            </div>
        </div>
    </div>
</nav>

<div class="container my-4 my-lg-5">

    <div class="status-panel shadow-sm mb-4">
        <div class="row align-items-center g-3">
            <div class="col-md-7">
                <div class="d-flex align-items-center gap-3">
                    <div class="timer-icon">
                        <i class="bi bi-stopwatch"></i>
                    </div>

                    <div>
                        <div class="text-muted small fw-semibold text-uppercase">
                            Tiempo restante
                        </div>
                        <div id="temporizador" class="timer-text">--:--</div>
                    </div>
                </div>
            </div>

            <div class="col-md-5 text-md-end">
                <button class="btn btn-danger btn-lg fw-semibold" id="btnFinalizar">
                    <i class="bi bi-check2-circle me-2"></i>Finalizar test
                </button>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-lg main-test-card">
        <div class="card-body p-4 p-lg-5">

            <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
                <div>
                    <span class="section-label">Evaluación asignada</span>
                    <h4 id="tituloTest" class="fw-bold mb-1">Cargando test...</h4>
                    <p class="text-muted mb-0">
                        Seleccione una respuesta por cada ítem.
                    </p>
                </div>

                <div class="text-lg-end">
                    <span class="badge rounded-pill text-bg-primary px-3 py-2" id="contadorPreguntas">
                        Cargando ítems
                    </span>
                </div>
            </div>

            <div class="instructions-card mb-4" id="bloqueInstrucciones">
                <div class="d-flex gap-3">
                    <div class="instructions-icon">
                        <i class="bi bi-info-circle"></i>
                    </div>

                    <div>
                        <strong>Instrucciones</strong>
                        <p id="instruccionesTest" class="mb-0 mt-2"></p>
                    </div>
                </div>
            </div>

            <form id="testForm">
                <div id="contenedorPreguntas"></div>
            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const API_BASE_URL = "http://localhost:3000/api";

    let idAplicacion = null;
    let tiempoRestante = 0;
    let intervalo = null;
    let items = [];

    document.addEventListener("DOMContentLoaded", async () => {
        console.log("test.html ejecutando JavaScript correctamente");

        const params = new URLSearchParams(window.location.search);

        idAplicacion = localStorage.getItem("idAplicacion") || params.get("idAplicacion");
        const nombreEvaluado = localStorage.getItem("nombreEvaluado") || "Evaluado";

        if (!idAplicacion) {
            Swal.fire({
                icon: "warning",
                title: "Sesión no encontrada",
                text: "Debe iniciar sesión nuevamente."
            }).then(() => {
                window.location.href = "index.html";
            });
            return;
        }

        document.getElementById("nombreEvaluado").textContent = nombreEvaluado;

        await cargarTest();

        document.getElementById("btnFinalizar").addEventListener("click", confirmarFinalizar);
    });

    async function cargarTest() {
        try {
            const respuesta = await fetch(
                `${API_BASE_URL}/test/${idAplicacion}?t=${Date.now()}`,
                {
                    method: "GET",
                    cache: "no-store"
                }
            );

            if (!respuesta.ok) {
                throw new Error("No se pudo conectar con el servidor Node.");
            }

            const data = await respuesta.json();

            console.log("Datos recibidos desde Node:", data);

            if (!data.ok) {
                Swal.fire("Error", data.mensaje, "error").then(() => {
                    window.location.href = "index.html";
                });
                return;
            }

            items = data.items || [];

            document.getElementById("tituloTest").textContent =
                `Razonamiento Forma ${data.tipoTest}`;

            document.getElementById("instruccionesTest").textContent =
                data.instrucciones || "Sin instrucciones registradas.";

            document.getElementById("contadorPreguntas").textContent =
                `${items.length} ítems`;

            renderizarPreguntas(items);
            restaurarRespuestasTemporales();

            /*
             * Aquí está la corrección:
             * Se usa el tiempo restante calculado por PostgreSQL.
             * NO se reinicia con data.tiempoMinutos * 60.
             */
            tiempoRestante = Number(
                data.tiempoRestanteSegundos ?? (data.tiempoMinutos * 60)
            );

            tiempoRestante = Math.max(0, tiempoRestante);

            if (tiempoRestante <= 0) {
                actualizarTemporizador();
                Swal.fire({
                    icon: "warning",
                    title: "Tiempo finalizado",
                    text: "El tiempo del test ha terminado."
                }).then(() => finalizarTest(true));
                return;
            }

            iniciarTemporizador();

        } catch (error) {
            console.error("Error al cargar test:", error);

            Swal.fire(
                "Error",
                "No se pudo cargar el test desde PostgreSQL. Verifique que Node esté ejecutándose en localhost:3000.",
                "error"
            );
        }
    }

    function renderizarPreguntas(listaItems) {
        const contenedor = document.getElementById("contenedorPreguntas");
        contenedor.innerHTML = "";

        if (!listaItems || listaItems.length === 0) {
            contenedor.innerHTML = `
                <div class="alert alert-warning rounded-4">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    Este test no tiene ítems registrados en OpenXava.
                </div>
            `;
            return;
        }

        listaItems.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "question-card mb-4";

            card.innerHTML = `
                <div class="question-header">
                    <span class="question-number">${index + 1}</span>
                    <div>
                        <div class="text-muted small">Ítem ${item.numero}</div>
                        <p class="question-text mb-0">${item.enunciado}</p>
                    </div>
                </div>

                <div class="answers-grid mt-3">
                    ${crearOpcion(item.numero, "A", item.opcion_a)}
                    ${crearOpcion(item.numero, "B", item.opcion_b)}
                    ${crearOpcion(item.numero, "C", item.opcion_c)}
                    ${crearOpcion(item.numero, "D", item.opcion_d)}
                </div>
            `;

            contenedor.appendChild(card);
        });

        activarGuardadoTemporal();
    }

    function crearOpcion(numeroItem, letra, texto) {
        return `
            <div class="answer-option">
                <input
                    class="form-check-input"
                    type="radio"
                    name="item_${numeroItem}"
                    id="item_${numeroItem}_${letra}"
                    value="${letra}"
                >
                <label class="answer-label" for="item_${numeroItem}_${letra}">
                    <span class="answer-letter">${letra}</span>
                    <span>${texto}</span>
                </label>
            </div>
        `;
    }

    function iniciarTemporizador() {
        clearInterval(intervalo);

        actualizarTemporizador();

        intervalo = setInterval(() => {
            tiempoRestante--;

            if (tiempoRestante < 0) {
                tiempoRestante = 0;
            }

            actualizarTemporizador();

            if (tiempoRestante <= 0) {
                clearInterval(intervalo);
                finalizarTest(true);
            }
        }, 1000);
    }

    function actualizarTemporizador() {
        const minutos = Math.floor(tiempoRestante / 60);
        const segundos = tiempoRestante % 60;

        document.getElementById("temporizador").textContent =
            `${String(minutos).padStart(2, "0")}:${String(segundos).padStart(2, "0")}`;
    }

    function activarGuardadoTemporal() {
        const radios = document.querySelectorAll("#contenedorPreguntas input[type='radio']");

        radios.forEach((radio) => {
            radio.addEventListener("change", guardarRespuestasTemporales);
        });
    }

    function guardarRespuestasTemporales() {
        const respuestasTemporales = {};

        items.forEach((item) => {
            const seleccionada = document.querySelector(
                `input[name="item_${item.numero}"]:checked`
            );

            respuestasTemporales[item.numero] = seleccionada ? seleccionada.value : null;
        });

        localStorage.setItem(
            `respuestasTemporales_${idAplicacion}`,
            JSON.stringify(respuestasTemporales)
        );
    }

    function restaurarRespuestasTemporales() {
        const guardadas = localStorage.getItem(`respuestasTemporales_${idAplicacion}`);

        if (!guardadas) {
            return;
        }

        const respuestasTemporales = JSON.parse(guardadas);

        Object.keys(respuestasTemporales).forEach((numeroItem) => {
            const valor = respuestasTemporales[numeroItem];

            if (!valor) {
                return;
            }

            const radio = document.getElementById(`item_${numeroItem}_${valor}`);

            if (radio) {
                radio.checked = true;
            }
        });
    }

    function confirmarFinalizar() {
        Swal.fire({
            icon: "question",
            title: "¿Finalizar test?",
            text: "Después de finalizar no podrá modificar sus respuestas.",
            showCancelButton: true,
            confirmButtonText: "Sí, finalizar",
            cancelButtonText: "Cancelar"
        }).then((result) => {
            if (result.isConfirmed) {
                finalizarTest(false);
            }
        });
    }

    async function finalizarTest(porTiempo) {
        clearInterval(intervalo);

        const respuestas = items.map((item) => {
            const seleccionada = document.querySelector(
                `input[name="item_${item.numero}"]:checked`
            );

            return {
                numeroItem: item.numero,
                respuestaSeleccionada: seleccionada ? seleccionada.value : null
            };
        });

        try {
            const respuesta = await fetch(`${API_BASE_URL}/respuestas`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    idAplicacion: Number(idAplicacion),
                    respuestas: respuestas
                })
            });

            const data = await respuesta.json();

            if (!data.ok) {
                Swal.fire("Error", data.mensaje, "error");
                if (!porTiempo) {
                    iniciarTemporizador();
                }
                return;
            }

            localStorage.removeItem(`respuestasTemporales_${idAplicacion}`);

            if (data.siguienteTest === true) {
                if (data.siguienteAplicacion && data.idAplicacionSiguiente) {
                    idAplicacion = String(data.idAplicacionSiguiente);
                    localStorage.setItem("idAplicacion", idAplicacion);
                }

                await Swal.fire({
                    icon: "success",
                    title: porTiempo ? "Tiempo finalizado" : "Test guardado",
                    text: data.mensaje || "Ahora continuará con el siguiente test.",
                    confirmButtonText: "Continuar"
                });

                items = [];
                tiempoRestante = 0;
                await cargarTest();
                return;
            }

            localStorage.clear();

            await Swal.fire({
                icon: "success",
                title: porTiempo ? "Tiempo finalizado" : "Evaluación finalizada",
                text: "Sus respuestas fueron guardadas correctamente."
            });

            window.location.href = "index.html";

        } catch (error) {
            console.error("Error al guardar respuestas:", error);

            Swal.fire(
                "Error",
                "No se pudieron guardar las respuestas en PostgreSQL.",
                "error"
            );

            if (!porTiempo) {
                iniciarTemporizador();
            }
        }
    }
</script>

</body>
</html>
